<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Testimonial Section</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
    }

    .main-container {
      background-color: #f5f5f5;
      padding: 40px;
    }

    .main-container h2 {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #000;
    }

    .testimonial {
      background-color: #ffffff;
      border: 1px solid #ddd;
      padding: 16px 20px;
      margin-bottom: 16px;
    }

    .testimonial p.text {
      font-size: 14px;
      color: #333;
      margin-bottom: 10px;
    }

    .testimonial p.author {
      text-align: right;
      font-style: italic;
      font-size: 13px;
      color: #333;
    }
  </style>
</head>
<body>

  <div class="main-container">
    <h2>Testimonials</h2>

    <div class="testimonial">
      <p class="text">This product is amazing! I highly recommend it to anyone in need of a solution like this.</p>
      <p class="author">- John Doe</p>
    </div>

    <div class="testimonial">
      <p class="text">I have been using this for a few weeks now and it has completely transformed my workflow.</p>
      <p class="author">- Jane Smith</p>
    </div>

  </div>

</body>
</html>
